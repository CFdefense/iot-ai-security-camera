<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Camera dashboard — Login</title>
    <link rel="icon" href="{{ url_for('static', filename='img/shield-logo.svg') }}" type="image/svg+xml" />
    <style>
      :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e8eaed; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
      .card {
        background: #1a232d;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0,0,0,.35);
        width: min(360px, 92vw);
      }
      .login-brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 1rem;
      }
      .login-brand img {
        width: 2.25rem;
        height: 2.25rem;
        flex-shrink: 0;
      }
      h1 { font-size: 1.25rem; margin: 0; font-weight: 600; flex: 1; min-width: 0; }
      label { display: block; font-size: 0.8rem; color: #9aa7b8; margin-top: 0.75rem; }
      input {
        width: 100%; box-sizing: border-box;
        margin-top: 0.25rem; padding: 0.5rem 0.6rem;
        border-radius: 8px; border: 1px solid #394551;
        background: #0f1419; color: inherit;
      }
      button {
        margin-top: 1.25rem;
        width: 100%; padding: 0.6rem;
        border: none; border-radius: 8px;
        background: #3b82f6; color: #fff;
        font-weight: 600; cursor: pointer;
      }
      button:hover { filter: brightness(1.08); }
      .err {
        margin-top: 1rem;
        padding: 0.5rem 0.65rem;
        border-radius: 8px;
        background: rgba(239,68,68,.15);
        color: #fda4af;
        font-size: 0.875rem;
      }
    </style>
</head>
<body>
  <div class="card">
    <div class="login-brand">
      <img src="{{ url_for('static', filename='img/shield-logo.svg') }}" width="36" height="36" alt="" />
      <h1>Security camera dashboard</h1>
    </div>
    {% if error %}
    <div class="err">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('login_submit') }}">
      <label for="email">Username or email</label>
      <input id="email" name="email" type="text" inputmode="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
